<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Calculator - DailyKitBox</title>
    <meta name="description" content="Calculate your monthly mortgage payments, interest, and loan timeline instantly with DailyKitBox.">
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .tool-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-prefix {
            position: absolute;
            left: 12px;
            color: #64748b;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 30px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #2563eb;
        }
        .btn-calc {
            width: 100%;
            background-color: #2563eb;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-calc:hover {
            background-color: #1d4ed8;
        }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            display: none;
        }
        .result-title {
            font-size: 18px;
            color: #475569;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .result-amount {
            font-size: 32px;
            color: #10b981;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 14px;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="../index.html" class="logo">DailyKitBox</a>
            <div class="nav-links">
                <a href="../index.html">← Back to Home</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="tool-container">
            <h1 style="font-size: 28px; margin-bottom: 10px;">🏠 Mortgage Calculator</h1>
            <p style="color: #64748b; margin-bottom: 25px;">Estimate your monthly loan payments dynamically.</p>

            <div class="form-group">
                <label for="homeValue">Home Price</label>
                <div class="input-wrapper">
                    <span class="input-prefix">$</span>
                    <input type="number" id="homeValue" value="300000">
                </div>
            </div>

            <div class="form-group">
                <label for="downPayment">Down Payment</label>
                <div class="input-wrapper">
                    <span class="input-prefix">$</span>
                    <input type="number" id="downPayment" value="60000">
                </div>
            </div>

            <div class="form-group">
                <label for="interestRate">Interest Rate (Annual %)</label>
                <div class="input-wrapper">
                    <span class="input-prefix" style="left:10px">%</span>
                    <input type="number" id="interestRate" step="0.1" value="4.5" style="padding-left:25px;">
                </div>
            </div>

            <div class="form-group">
                <label for="loanTerm">Loan Term (Years)</label>
                <div class="input-wrapper">
                    <span class="input-prefix" style="left:10px">📅</span>
                    <input type="number" id="loanTerm" value="30" style="padding-left:35px;">
                </div>
            </div>

            <button id="calculateBtn" class="btn-calc">Calculate Payment</button>

            <div class="result-box" id="resultBox">
                <div class="result-title">Estimated Monthly Payment</div>
                <div class="result-amount" id="monthlyPayment">$0.00</div>
                <div class="result-stats">
                    <div>Total Principal: <strong id="totalPrincipal">$0</strong></div>
                    <div>Total Interest: <strong id="totalInterest">$0</strong></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 DailyKitBox. Built for speed and privacy.</p>
    </footer>

    <script src="../assets/script.js"></script>
    <script src="mortgage.js"></script>
</body>
</html>
