<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPG to PDF Converter - DailyKitBox</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div class="max-w-xl mx-auto mt-12 p-6 bg-white rounded-xl shadow-md border border-gray-100">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Convert JPG to PDF Online Instantly</h1>
        
        <div class="mt-6 mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Upload JPG Images</label>
            <input type="file" id="imageInput" accept="image/jpeg, image/jpg" multiple 
                   class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-300 rounded-lg p-2">
        </div>

        <button id="convertBtn" onclick="convertToPDF()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition duration-200 shadow-sm cursor-pointer">
            Convert & Download PDF
        </button>

        <p id="statusMessage" class="mt-4 text-sm text-center font-medium text-gray-500 hidden"></p>

        <hr class="my-8 border-gray-200">

        <div class="prose max-w-none text-gray-600">
            <h3 class="text-xl font-semibold text-gray-800 mb-2">Why You Should Convert Your Receipts and Documents to PDF</h3>
            <p class="text-sm leading-relaxed">Whether you are filing taxes in the US (IRS) or submitting business expenses, converting loose images into a clean single PDF file keeps your files organized, universally accessible, and highly secure.</p>
        </div>
    </div>

    <script>
        async function convertToPDF() {
            const imageInput = document.getElementById('imageInput');
            const convertBtn = document.getElementById('convertBtn');
            const statusMessage = document.getElementById('statusMessage');

            // 1. Check if files are uploaded
            if (imageInput.files.length === 0) {
                alert('Please select at least one JPG image first!');
                return;
            }

            // Update UI to show processing
            convertBtn.disabled = true;
            convertBtn.innerText = "Processing...";
            statusMessage.classList.remove('hidden');
            statusMessage.innerText = "Reading images, please wait...";
            statusMessage.className = "mt-4 text-sm text-center font-medium text-blue-600";

            try {
                // Initialize jsPDF globally using the updated window context required by CDN 2.5.1
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();

                for (let i = 0; i < imageInput.files.length; i++) {
                    const file = imageInput.files[i];
                    
                    // Convert file to Base64 using a Promise structure
                    const base64Data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = error => reject(error);
                        reader.readAsDataURL(file);
                    });

                    // Add a new page for subsequent images
                    if (i > 0) {
                        pdf.addPage();
                    }

                    // Draw image directly onto full A4 boundary dimensions
                    pdf.addImage(base64Data, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                }

                // Save and trigger native device download
                pdf.save('DailyKitBox-Converted.pdf');
                
                // Reset UI state after successful download
                statusMessage.innerText = "Success! Your PDF has been downloaded.";
                statusMessage.className = "mt-4 text-sm text-center font-medium text-green-600";

            } catch (error) {
                console.error("Error during PDF generation:", error);
                alert("Something went wrong during conversion. Please try a different image.");
                statusMessage.innerText = "Conversion failed.";
                statusMessage.className = "mt-4 text-sm text-center font-medium text-red-600";
            } finally {
                // Re-enable the operation button
                convertBtn.disabled = false;
                convertBtn.innerText = "Convert & Download PDF";
            }
        }
    </script>
</body>
    </html>
