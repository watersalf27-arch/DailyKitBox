<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online Age Calculator by DailyKitBox. Calculate exact human age, animal ages, birthday countdowns, age differences, and more.">
    <meta name="keywords" content="age calculator, birthday calculator, animal age calculator, dog age, cat age, age difference, zodiac">
    <title>Age Calculator - DailyKitBox</title>

    <link rel="stylesheet" href="assets/css/age-calculator.css">

    <style>
        /* Small additional fixes */
        .history-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="nav">
                <div class="logo">
                    <span class="logo-icon">📅</span>
                    <h1>DailyKitBox</h1>
                </div>
                <div class="header-title">
                    <h2>Age Calculator</h2>
                </div>
                <div class="controls">
                    <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
                        <span id="theme-icon">🌙</span>
                    </button>
                    <button id="history-btn" class="icon-btn" aria-label="View history">📖</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="human">Human Age</button>
                <button class="tab-btn" data-tab="animal">Animal Age</button>
                <button class="tab-btn" data-tab="tools">Tools</button>
            </div>

            <!-- ==================== HUMAN AGE TAB ==================== -->
            <div id="human-tab" class="tab-content active">
                <div class="calculator-grid">
                    <!-- Input Card -->
                    <div class="card">
                        <h3>Enter Birth Date</h3>
                        <div class="form-group">
                            <label for="birth-date">Birth Date</label>
                            <input type="date" id="birth-date" required>
                        </div>
                        <div class="form-group">
                            <label for="birth-time">Birth Time (Optional)</label>
                            <input type="time" id="birth-time" value="12:00">
                        </div>
                        <button id="calculate-human" class="btn-primary">Calculate Age</button>
                    </div>

                    <!-- Results Card -->
                    <div class="card">
                        <h3>Your Age</h3>
                        <div id="human-results" class="results"></div>

                        <div class="result-actions">
                            <button id="copy-human" class="btn-secondary">Copy</button>
                            <button id="share-human" class="btn-secondary">Share</button>
                            <button id="print-human" class="btn-secondary">Print</button>
                        </div>
                    </div>
                </div>

                <!-- Additional Info -->
                <div class="info-grid">
                    <div class="card">
                        <h4>Zodiac Signs</h4>
                        <div id="zodiac-info"></div>
                    </div>
                    <div class="card">
                        <h4>Life Statistics</h4>
                        <div id="life-stats"></div>
                    </div>
                </div>
            </div>

            <!-- ==================== ANIMAL AGE TAB ==================== -->
            <div id="animal-tab" class="tab-content">
                <div class="calculator-grid">
                    <div class="card">
                        <h3>Pet Age Calculator</h3>
                        <div class="form-group">
                            <label for="animal-type">Select Animal</label>
                            <select id="animal-type"></select>
                        </div>
                        <div class="form-group">
                            <label for="pet-age">Age in Animal Years</label>
                            <input type="number" id="pet-age" value="5" min="0" step="0.1">
                        </div>
                        <button id="calculate-animal" class="btn-primary">Convert to Human Years</button>
                    </div>

                    <div class="card">
                        <h3>Equivalent Human Age</h3>
                        <div id="animal-results" class="results"></div>
                    </div>
                </div>
            </div>

            <!-- ==================== TOOLS TAB ==================== -->
            <div id="tools-tab" class="tab-content">
                <div class="tools-grid">
                    <div class="tool-card">
                        <h4>Age Difference</h4>
                        <input type="date" id="date1" style="margin-bottom:10px;">
                        <input type="date" id="date2">
                        <button id="calc-diff" class="btn-primary" style="margin-top:15px;">Calculate Difference</button>
                        <div id="diff-result" style="margin-top:1rem; font-weight:600;"></div>
                    </div>

                    <div class="tool-card">
                        <h4>Birthday Countdown</h4>
                        <input type="date" id="next-birthday">
                        <div id="countdown-result" style="margin-top:1rem;"></div>
                    </div>

                    <div class="tool-card">
                        <h4>Retirement Age</h4>
                        <input type="number" id="retire-age" value="65" style="margin-bottom:12px;">
                        <button id="calc-retirement" class="btn-primary">Calculate Years Left</button>
                        <div id="retire-result" style="margin-top:1rem;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- History Modal -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <h3>Calculation History</h3>
            <div id="history-list"></div>
            <button id="clear-history" class="btn-secondary" style="margin-top:1.5rem; width:100%;">Clear All History</button>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 DailyKitBox. All Rights Reserved.</p>
            <p>Made with ❤️ for accurate calculations worldwide.</p>
        </div>
    </footer>

    <script src="assets/js/age-calculator.js"></script>
</body>
</html>
