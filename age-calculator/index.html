<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Age Calculator - DailyKitBox</title>
    <!-- Centralized CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="header">
        <h1>Age Calculator</h1>
        <a href="../index.html">← Back to Home</a>
    </div>

    <div class="tool-container">
        <div class="tool-card">
            <label>Enter your Date of Birth:</label>
            <input type="date" id="dob">
            
            <button class="premium-btn" onclick="calculateAge()">Calculate Age</button>
            
            <div id="ageResult" style="margin-top: 20px; font-size: 22px; font-weight: bold; color: #0a192f;"></div>
        </div>

        <section class="how-to-section">
            <h2>How to use Age Calculator?</h2>
            <ol>
                <li>Select your date of birth from the calendar.</li>
                <li>Click on "Calculate Age".</li>
                <li>Your exact age will be displayed instantly.</li>
            </ol>
        </section>
    </div>

    <!-- Centralized JS -->
    <script src="../assets/js/main.js"></script>
</body>
</html>
