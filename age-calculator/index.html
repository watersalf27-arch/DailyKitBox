<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator - DailyKitBox</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .premium-btn { background: linear-gradient(135deg, #FF9F1C, #FFBF69); color: #fff; padding: 18px 35px; border: none; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .spacer { margin-bottom: 3rem; }
        .tool-container { display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .how-to-section { width: 100%; max-width: 600px; margin-top: 50px; border-top: 2px solid #eee; }
    </style>
</head>
<body>
    <div class="header"><h1>Age Calculator</h1><a href="../index.html">Back Home</a></div>
    <div class="tool-container">
        <div style="text-align: center;">
            <label>Enter your Date of Birth:</label><br>
            <input type="date" id="dob" style="padding: 10px; margin: 10px;">
            <br><br>
            <button class="premium-btn" onclick="calculateAge()">Calculate Age</button>
            <div class="spacer"></div>
            <div id="ageResult" style="font-weight: bold; font-size: 20px;"></div>
        </div>
        <section class="how-to-section">
            <h2 style="font-size: 22px; text-align: center;">How to use?</h2>
            <ol><li>Select your DOB.</li><li>Click the "Calculate Age" button.</li><li>See your results below.</li></ol>
        </section>
    </div>
    <script>
        function calculateAge() {
            const dob = new Date(document.getElementById('dob').value);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            document.getElementById('ageResult').innerText = "You are " + age + " years old.";
        }
    </script>
</body>
</html>
