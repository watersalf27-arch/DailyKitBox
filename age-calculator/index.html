<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator - DailyKitBox</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --radius-lg: 12px;
            --radius-md: 8px;
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .calculator-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-md);
        }
        .title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .title-container .icon { font-size: 32px; }
        .title-container h1 {
            font-size: 28px;
            font-weight: 700;
        }
        .description {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: var(--radius-md);
            font-size: 16px;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--primary); }
        .calc-btn {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 24px;
        }
        .calc-btn:hover { background-color: var(--primary-hover); }
        .results-box {
            display: none;
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
        }
        .result-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .result-values {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.4;
        }
        .error-message {
            display: none;
            color: #ef4444;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="calculator-card">
        <a href="../index.html" class="back-btn">&larr; Back to Home</a>
        <div class="title-container">
            <span class="icon">📅</span>
            <h1>Age Calculator</h1>
        </div>
        <p class="description">Calculate your exact age in years, months, and days instantly by selecting your birth date.</p>
        <div class="input-group">
            <label for="dob">Select Date of Birth</label>
            <input type="date" id="dob">
        </div>
        <div class="error-message" id="errorMsg">Please select a valid birth date!</div>
        <button class="calc-btn" id="calcBtn">Calculate Age</button>
        <div class="results-box" id="resultsBox">
            <div class="result-title">Your Exact Age</div>
            <div class="result-values" id="ageResult"></div>
        </div>
    </div>
    <script>
        const dobInput = document.getElementById('dob');
        const calcBtn = document.getElementById('calcBtn');
        const resultsBox = document.getElementById('resultsBox');
        const ageResult = document.getElementById('ageResult');
        const errorMsg = document.getElementById('errorMsg');
        const today = new Date().toISOString().split('T')[0];
        dobInput.setAttribute('max', today);
        calcBtn.addEventListener('click', () => {
            const dobValue = dobInput.value;
            if (!dobValue) {
                errorMsg.style.display = 'block';
                resultsBox.style.display = 'none';
                return;
            }
            errorMsg.style.display = 'none';
            const birthDate = new Date(dobValue);
            const currentDate = new Date();
            let years = currentDate.getFullYear() - birthDate.getFullYear();
            let months = currentDate.getMonth() - birthDate.getMonth();
            let days = currentDate.getDate() - birthDate.getDate();
            if (days < 0) {
                months--;
                const previousMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0);
                days += previousMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }
            ageResult.innerHTML = `${years} Years<br>${months} Months<br>${days} Days`;
            resultsBox.style.display = 'block';
        });
    </script>
</body>
</html>
