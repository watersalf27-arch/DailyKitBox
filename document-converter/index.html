<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document Converter - DailyKitBox</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="header">
        <h1>Document Converter</h1>
        <a href="../index.html">← Back to Home</a>
    </div>

    <div class="tool-container">
        <div class="tool-card">
            <p>Convert your files to any format instantly.</p>
            <input type="file" id="fileInput">
            
            <select id="formatSelect" style="width: 100%; padding: 15px; margin-top: 15px; border-radius: 10px;">
                <option value="pdf">Convert to PDF</option>
                <option value="docx">Convert to DOCX</option>
                <option value="txt">Convert to TXT</option>
            </select>
            
            <button class="premium-btn" onclick="convertDocument()">Convert Now</button>
            
            <div id="convResult" style="margin-top: 20px; font-weight: bold;"></div>
        </div>

        <section class="how-to-section">
            <h2>How to use Document Converter?</h2>
            <ol>
                <li>Upload your document.</li>
                <li>Choose your desired output format from the list.</li>
                <li>Click "Convert Now" and wait for the download link.</li>
            </ol>
        </section>
    </div>

    <script src="../assets/js/main.js"></script>
</body>
</html>
