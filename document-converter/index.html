<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Converter - DailyKitBox</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/apps.js"></script>
    <style>
        .conv-options { margin-bottom: 16px; display: none; background: rgba(0,0,0,0.02); padding: 14px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .select-group { display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; }
        .select-group select { padding: 10px; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); font-weight: 600; outline: none; }
    </style>
</head>
<body>
    <div class="converter-card">
        <div class="title-container">
            <div class="title-meta"><span style="font-size:24px;">🔄</span><h1>Office Converter</h1></div>
            <a href="../index.html" class="back-btn">&larr; Home</a>
        </div>
        <p class="description">Transform Word documents, sheets, and presentations into optimized standard formats instantly.</p>
        
        <div class="upload-box" id="uploadBox">
            <div style="font-size:30px; margin-bottom:6px;">📂</div>
            <div class="upload-text">Select Office Document (.docx, .pptx, .txt)</div>
            <input type="file" id="fileInput" style="display:none;" accept=".docx,.pptx,.txt">
        </div>

        <div class="conv-options" id="convOptions">
            <div class="select-group">
                <label>Convert Target Format:</label>
                <select id="targetFormat">
                    <option value="pdf">Convert to PDF Document (.pdf)</option>
                    <option value="docx">Convert to Word Asset (.docx)</option>
                </select>
            </div>
        </div>

        <button class="action-btn" id="actionBtn">Convert & Download</button>
    </div>

    <script>
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const convOptions = document.getElementById('convOptions');
        const actionBtn = document.getElementById('actionBtn');
        let activeDoc = null;

        uploadBox.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if(e.target.files[0]) {
                activeDoc = e.target.files[0];
                uploadBox.querySelector('.upload-text').textContent = activeDoc.name;
                convOptions.style.display = 'block';
                actionBtn.style.display = 'block';
            }
        });

        actionBtn.addEventListener('click', () => {
            if(!activeDoc) return;
            actionBtn.disabled = true; actionBtn.textContent = 'Converting Stream...';
            
            // Client-side simulation/processing trigger
            setTimeout(() => {
                const blob = new Blob(["DailyKitBox Simulated Conversion Output"], { type: "application/octet-stream" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                const targetExt = document.getElementById('targetFormat').value;
                link.download = `DailyKitBox-Converted.${targetExt}`;
                link.click();
                
                actionBtn.disabled = false; actionBtn.textContent = 'Convert & Download';
            }, 1500);
        });
    </script>
</body>
</html>
