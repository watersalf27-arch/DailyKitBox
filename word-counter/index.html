<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter - DailyKitBox</title>
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .tool-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .text-area-container {
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus {
            border-color: #2563eb;
        }
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .counter-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .counter-num {
            font-size: 24px;
            font-weight: 700;
            color: #2563eb;
        }
        .counter-label {
            font-size: 13px;
            color: #64748b;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        @media (max-width: 600px) {
            .counter-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="../index.html" class="logo">DailyKitBox</a>
            <div class="nav-links">
                <a href="../index.html">← Back to Home</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="tool-container">
            <h1 style="font-size: 26px; margin-bottom: 10px;">📝 Real-Time Word Counter</h1>
            <p style="color: #64748b; margin-bottom: 25px;">Type or paste your text to count words, characters, sentences, and paragraphs instantly.</p>

            <div class="counter-grid">
                <div class="counter-card"><div class="counter-num" id="wordCount">0</div><div class="counter-label">Words</div></div>
                <div class="counter-card"><div class="counter-num" id="charCount">0</div><div class="counter-label">Characters</div></div>
                <div class="counter-card"><div class="counter-num" id="sentenceCount">0</div><div class="counter-label">Sentences</div></div>
                <div class="counter-card"><div class="counter-num" id="paragraphCount">0</div><div class="counter-label">Paragraphs</div></div>
            </div>

            <div class="text-area-container">
                <textarea id="textInput" placeholder="Start typing or paste your content here..."></textarea>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 DailyKitBox. Built for speed and privacy. Text is never sent to any server.</p>
    </footer>

    <script src="../assets/script.js"></script>
    <script src="word-counter.js"></script>
</body>
</html>
