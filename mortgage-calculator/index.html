<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Calculator - DailyKitBox</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --radius-lg: 12px;
            --radius-md: 8px;
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .calculator-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-md);
        }
        .title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .title-container .icon {
            font-size: 32px;
        }
        .title-container h1 {
            font-size: 28px;
            font-weight: 700;
        }
        .description {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: var(--radius-md);
            font-size: 16px;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: var(--primary);
        }
        .results-box {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-top: 24px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .result-row:last-child {
            margin-bottom: 0;
            padding-top: 12px;
            border-top: 1px dashed var(--border-color);
        }
        .result-label {
            font-weight: 500;
            font-size: 14px;
            color: var(--text-muted);
        }
        .result-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }
        .result-row.monthly .result-label {
            color: var(--primary);
            font-weight: 700;
            font-size: 15px;
        }
        .result-row.monthly .result-value {
            color: var(--primary);
            font-size: 24px;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="calculator-card">
        <a href="../index.html" class="back-btn">&larr; Back to Home</a>        
        <div class="title-container">
            <span class="icon">🏠</span>
            <h1>Mortgage Calculator</h1>
        </div>        
        <p class="description">Calculate your monthly home loan payments, interest, and overall payoff layout instantly.</p>
        <div class="input-group">
            <label for="homeValue">Home Value ($)</label>
            <input type="number" id="homeValue" value="300000" min="0">
        </div>
        <div class="input-group">
            <label for="downPayment">Down Payment ($)</label>
            <input type="number" id="downPayment" value="60000" min="0">
        </div>
        <div class="input-group">
            <label for="interestRate">Interest Rate (%)</label>
            <input type="number" id="interestRate" value="6.5" step="0.01" min="0">
        </div>
        <div class="input-group">
            <label for="loanTerm">Loan Term (Years)</label>
            <input type="number" id="loanTerm" value="30" min="1">
        </div>
        <div class="results-box">
            <div class="result-row">
                <span class="result-label">Loan Amount:</span>
                <span class="result-value" id="loanAmount">$0.00</span>
            </div>
            <div class="result-row monthly">
                <span class="result-label">Monthly Payment:</span>
                <span class="result-value" id="monthlyPayment">$0.00</span>
            </div>
            <div class="result-row">
                <span class="result-label">Total Interest Paid:</span>
                <span class="result-value" id="totalInterest">$0.00</span>
            </div>
        </div>
    </div>
    <script>
        const homeValueInput = document.getElementById('homeValue');
        const downPaymentInput = document.getElementById('downPayment');
        const interestRateInput = document.getElementById('interestRate');
        const loanTermInput = document.getElementById('loanTerm');
        const loanAmountResult = document.getElementById('loanAmount');
        const monthlyPaymentResult = document.getElementById('monthlyPayment');
        const totalInterestResult = document.getElementById('totalInterest');
        function calculateMortgage() {
            const homeValue = parseFloat(homeValueInput.value) || 0;
            const downPayment = parseFloat(downPaymentInput.value) || 0;
            const annualRate = parseFloat(interestRateInput.value) || 0;
            const years = parseInt(loanTermInput.value) || 0;
            const loanAmount = homeValue - downPayment;            loanAmountResult.textContent = `$${Math.max(0, loanAmount).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            if (loanAmount <= 0 || annualRate <= 0 || years <= 0) {
                monthlyPaymentResult.textContent = '$0.00';                totalInterestResult.textContent = '$0.00';
                return;
            }
            const monthlyRate = (annualRate / 100) / 12;
            const numberOfPayments = years * 12;
            const monthlyPayment = (loanAmount * monthlyRate * Math.pow(1 + monthlyRate, numberOfPayments)) / (Math.pow(1 + monthlyRate, numberOfPayments) - 1);            
            if (isFinite(monthlyPayment)) {
                const totalCost = monthlyPayment * numberOfPayments;
                const totalInterest = totalCost - loanAmount;                monthlyPaymentResult.textContent = `$${monthlyPayment.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;                totalInterestResult.textContent = `$${totalInterest.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            } else {
                monthlyPaymentResult.textContent = '$0.00';                totalInterestResult.textContent = '$0.00';
            }
        }        homeValueInput.addEventListener('input', calculateMortgage);        downPaymentInput.addEventListener('input', calculateMortgage);        interestRateInput.addEventListener('input', calculateMortgage);        loanTermInput.addEventListener('input', calculateMortgage);
        calculateMortgage();
    </script>
</body>
</html>
