<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPG to PDF Converter - DailyKitBox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --radius-lg: 12px;
            --radius-md: 8px;
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .converter-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-md);
        }
        .title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .title-container .icon {
            font-size: 32px;
        }
        .title-container h1 {
            font-size: 28px;
            font-weight: 700;
        }
        .description {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-lg);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background-color: #f8fafc;
            transition: border-color 0.2s, background-color 0.2s;
            margin-bottom: 24px;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background-color: rgba(37, 99, 235, 0.02);
        }
        .upload-icon {
            font-size: 40px;
            margin-bottom: 12px;
            color: var(--text-muted);
        }
        .upload-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 4px;
        }
        .upload-hint {
            font-size: 13px;
            color: var(--text-muted);
        }
        #fileInput {
            display: none;
        }
        .preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
            max-height: 180px;
            overflow-y: auto;
            padding: 4px;
        }
        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            background-color: #f1f5f9;
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .convert-btn {
            display: none;
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .convert-btn:hover {
            background-color: var(--primary-hover);
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="converter-card">
        <a href="../index.html" class="back-btn">&larr; Back to Home</a>        
        <div class="title-container">
            <span class="icon">📄</span>
            <h1>JPG to PDF</h1>
        </div>        
        <p class="description">Convert multiple images into a single professional PDF file instantly in your browser.</p>
        <div class="upload-area" id="dropZone">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Click or Drag & Drop Images</div>
            <div class="upload-hint">Supports JPG, JPEG, PNG</div>
            <input type="file" id="fileInput" accept="image/jpeg, image/jpg, image/png" multiple>
        </div>
        <div class="preview-container" id="previewContainer"></div>
        <button class="convert-btn" id="convertBtn">Convert to PDF</button>
    </div>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const convertBtn = document.getElementById('convertBtn');        
        let selectedFiles = [];        dropZone.addEventListener('click', () => fileInput.click());        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();            dropZone.classList.add('dragover');
        });        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();            dropZone.classList.remove('dragover');            handleFiles(e.dataTransfer.files);
        });        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });
        function handleFiles(files) {
            const validExtensions = ['image/jpeg', 'image/jpg', 'image/png'];            
            for (let file of files) {
                if (validExtensions.includes(file.type)) {
                    selectedFiles.push(file);                    
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const item = document.createElement('div');                        item.classList.add('preview-item');                        
                        const img = document.createElement('img');
                        img.src = e.target.result;
                                                item.appendChild(img);                        previewContainer.appendChild(item);
                    }                    reader.readAsDataURL(file);
                }
            }
            if (selectedFiles.length > 0) {
                convertBtn.style.display = 'block';
            }
        }
        // Optimized Image Loading + PDF Export Logic        convertBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;            
            convertBtn.disabled = true;
            convertBtn.textContent = 'Converting...';            
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            for (let i = 0; i < selectedFiles.length; i++) {
                if (i > 0) pdf.addPage();                
                try {
                    const fileData = await fileToDataURL(selectedFiles[i]);                    
                    // Native calculation to fit image within proper A4 margins smoothly
                    const pageWidth = pdf.internal.pageSize.getWidth();
                    const pageHeight = pdf.internal.pageSize.getHeight();
                                        pdf.addImage(fileData, 'JPEG', 0, 0, pageWidth, pageHeight);
                } catch (err) {
                    console.error("Image loading failed: ", err);
                }
            }            pdf.save('DailyKitBox-Converted.pdf');           
            convertBtn.disabled = false;
            convertBtn.textContent = 'Convert to PDF';
        });
        function fileToDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
