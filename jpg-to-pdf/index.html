<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JPG to PDF Converter | DailyKitBox</title>
<style>
.pdf-wrapper{max-width:700px;margin:20px auto;padding:20px;font-family:sans-serif;background:#fff;}
.upload-area{border:2px dashed #0a192f;padding:40px;text-align:center;cursor:pointer;border-radius:10px;margin-bottom:20px;}
.btn-convert, .btn-download{width:100%;padding:15px;background:#0a192f;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:18px;margin-bottom:20px;}
.btn-download{background:#28a745; display:none;} /* Download button shuru mein chupa hoga */
.progress-container{width:100%;background:#eee;border-radius:10px;display:none;margin-bottom:20px;height:20px;overflow:hidden;}
.progress-bar{height:100%;width:0%;background:#0a192f;transition:0.3s;}
</style>
</head>
<body>
<div class="pdf-wrapper">
<h1>JPG to PDF Converter</h1>
<div id="uploadZone" class="upload-area">Click to Upload Images or Drag & Drop</div>
<input type="file" id="fileInput" multiple style="display:none;" accept="image/jpeg">

<div class="progress-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>

<button id="convertBtn" class="btn-convert">Convert to PDF</button>
<button id="downloadBtn" class="btn-download" onclick="alert('Downloading your PDF...')">Download PDF File</button>

</div>

<script>
const fileInput = document.getElementById('fileInput'), 
      uploadZone = document.getElementById('uploadZone'), 
      convertBtn = document.getElementById('convertBtn'), 
      downloadBtn = document.getElementById('downloadBtn'),
      progressBar = document.getElementById('progressBar'), 
      progressContainer = document.getElementById('progressContainer');

uploadZone.addEventListener('click',()=>fileInput.click());

convertBtn.addEventListener('click', () => {
    if(fileInput.files.length === 0) return alert("Pehle images upload karein!");
    
    // Process shuru
    progressContainer.style.display = "block";
    convertBtn.style.display = "none"; // Convert button hata do
    
    let width = 0;
    let interval = setInterval(() => {
        if (width >= 100) {
            clearInterval(interval);
            progressContainer.style.display = "none";
            downloadBtn.style.display = "block"; // Yahan download button zahir ho jayega
        } else {
            width += 20;
            progressBar.style.width = width + "%";
        }
    }, 300);
});
</script>
</body>
</html>
