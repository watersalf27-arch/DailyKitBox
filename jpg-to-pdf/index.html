<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPG to PDF Converter - DailyKitBox</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Chhota sa CSS styling preview list ke liye */
        .image-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .image-item button { background: #ff4d4d; color: white; border: none; cursor: pointer; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>JPG to PDF</h1>
        <a href="../index.html">Back Home</a>
    </div>

    <div class="tool-container">
        <div class="tool-card">
            <div class="upload-box" style="border: 2px dashed #cbd5e0; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; background: #f7fafc;">
                <p>Click to upload or drag & drop your JPG images here</p>
                <input type="file" id="fileInput" accept="image/jpeg" multiple style="display:none;">
            </div>

            <div id="previewArea" style="margin-top: 20px; text-align: left;"></div>

            <button id="convertBtn" class="premium-btn">Convert to PDF</button>
        </div>
    </div>

    <section class="how-to-section">
        <h2>How to use JPG to PDF Converter?</h2>
        <ol>
            <li>Upload your images.</li>
            <li>Use delete button if needed.</li>
            <li>Click "Convert to PDF" and download.</li>
        </ol>
    </section>

    <script src="../assets/js/jpg-to-pdf.js"></script>
</body>
</html>
