<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Station - DailyKitBox</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/apps.js"></script>
    <style>
        .weather-input-container { display: flex; gap: 8px; margin-bottom: 16px; }
        .weather-input-container input { flex: 1; padding: 10px 14px; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); font-size: 14px; }
        .w-btn { background: var(--primary); color: white; border: none; padding: 0 16px; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; }
        .weather-display { display: none; text-align: center; padding: 16px; background: rgba(0,0,0,0.02); border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .temp-reading { font-size: 38px; font-weight: 800; color: var(--primary); margin: 10px 0; }
    </style>
</head>
<body>
    <div class="converter-card">
        <div class="title-container">
            <div class="title-meta"><span style="font-size:24px;">🌤️</span><h1>Weather Station</h1></div>
            <a href="../index.html" class="back-btn">&larr; Home</a>
        </div>
        <p class="description">Check current local climate matrices worldwide instantly via fast core caching engine.</p>
        
        <div class="weather-input-container">
            <input type="text" id="cityName" placeholder="Enter city name (e.g., London)...">
            <button class="w-btn" id="getWeather">Fetch</button>
        </div>

        <div class="weather-display" id="weatherDisplay">
            <h2 id="outCity">City Name</h2>
            <div class="temp-reading" id="outTemp">--°C</div>
            <p id="outCondition" style="font-weight:600; color:var(--text-muted);">Clear Sky</p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('getWeather');
        const display = document.getElementById('weatherDisplay');
        
        btn.addEventListener('click', async () => {
            const city = document.getElementById('cityName').value.trim();
            if(!city) return;
            btn.disabled = true; btn.textContent = '...';
            try {
                const res = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
                const data = await res.json();
                
                document.getElementById('outCity').textContent = city.toUpperCase();
                document.getElementById('outTemp').textContent = `${data.current_condition[0].temp_C}°C`;
                document.getElementById('outCondition').textContent = data.current_condition[0].weatherDesc[0].value;
                display.style.display = 'block';
            } catch(e) { alert('Weather stream server is taking too long.'); }
            btn.disabled = false; btn.textContent = 'Fetch';
        });
    </script>
</body>
</html>
