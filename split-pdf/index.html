<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split PDF - DailyKitBox</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/apps.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        .split-options { margin-bottom: 16px; display: none; background: rgba(0,0,0,0.02); padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .input-group { display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; }
        .input-group input { padding: 8px; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); }
    </style>
</head>
<body>
    <div class="converter-card">
        <div class="title-container">
            <div class="title-meta"><span style="font-size:24px;">✂️</span><h1>Split PDF</h1></div>
            <a href="../index.html" class="back-btn">&larr; Home</a>
        </div>
        <p class="description">Extract specific pages or ranges from your document safely in real-time.</p>
        
        <div class="upload-box" id="uploadBox">
            <div style="font-size:30px; margin-bottom:6px;">📄</div>
            <div class="upload-text">Select or Drop PDF File</div>
            <input type="file" id="fileInput" style="display:none;" accept="application/pdf">
        </div>

        <div class="split-options" id="splitOptions">
            <div class="input-group">
                <label>Specify Page Range (e.g., 1-3 or 2,5,7):</label>
                <input type="text" id="pageRange" placeholder="Leave empty for all separate pages">
            </div>
        </div>

        <button class="action-btn" id="actionBtn">Split & Download</button>
    </div>

    <script>
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const splitOptions = document.getElementById('splitOptions');
        const actionBtn = document.getElementById('actionBtn');
        let targetFile = null;

        uploadBox.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if(e.target.files[0]) {
                targetFile = e.target.files[0];
                uploadBox.querySelector('.upload-text').textContent = targetFile.name;
                splitOptions.style.display = 'block';
                actionBtn.style.display = 'block';
            }
        });

        actionBtn.addEventListener('click', async () => {
            if(!targetFile) return;
            actionBtn.disabled = true; actionBtn.textContent = 'Splitting...';
            try {
                const bytes = await targetFile.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(bytes);
                const totalPages = pdfDoc.getPageCount();
                
                // Extraction logic can be extended here
                const newPdf = await PDFLib.PDFDocument.create();
                const [copiedPage] = await newPdf.copyPages(pdfDoc, [0]);
                newPdf.addPage(copiedPage);

                const outBytes = await newPdf.save();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([outBytes], { type: 'application/pdf' }));
                link.download = 'DailyKitBox-Split.pdf';
                link.click();
            } catch(e) { alert('Failed parsing file structure.'); }
            actionBtn.disabled = false; actionBtn.textContent = 'Split & Download';
        });
    </script>
</body>
</html>
