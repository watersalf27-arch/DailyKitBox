<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete PDF Pages - DailyKitBox</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="header">
        <h1>Delete PDF Pages</h1>
        <a href="../index.html">← Back to Home</a>
    </div>

    <div class="tool-container">
        <div class="tool-card">
            <p>Upload your PDF and enter the page numbers you want to remove.</p>
            <input type="file" id="pdfInput">
            <input type="text" id="pageNumbers" placeholder="e.g., 2, 5, 8">
            
            <button class="premium-btn" onclick="deletePages()">Delete Pages</button>
            
            <div id="deleteResult" style="margin-top: 20px; font-weight: bold;"></div>
        </div>

        <section class="how-to-section">
            <h2>How to use?</h2>
            <ol>
                <li>Upload your PDF file.</li>
                <li>Enter the page numbers you wish to delete (separated by commas).</li>
                <li>Click "Delete Pages" to process your document.</li>
            </ol>
        </section>
    </div>

    <script src="../assets/js/main.js"></script>
</body>
</html>
