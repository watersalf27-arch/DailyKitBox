<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete PDF Pages - DailyKitBox</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/apps.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        .delete-options { margin-bottom: 16px; display: none; background: rgba(0,0,0,0.02); padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .input-group { display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; }
        .input-group input { padding: 8px; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); }
    </style>
</head>
<body>
    <div class="converter-card">
        <div class="title-container">
            <div class="title-meta"><span style="font-size:24px;">🗑️</span><h1>Delete PDF Pages</h1></div>
            <a href="../index.html" class="back-btn">&larr; Home</a>
        </div>
        <p class="description">Remove unwanted or corrupted pages out of your document asset pipeline instantly.</p>
        
        <div class="upload-box" id="uploadBox">
            <div style="font-size:30px; margin-bottom:6px;">📄</div>
            <div class="upload-text">Select or Drop PDF File</div>
            <input type="file" id="fileInput" style="display:none;" accept="application/pdf">
        </div>

        <div class="delete-options" id="deleteOptions">
            <div class="input-group">
                <label>Pages to Delete (e.g., 2,4 or 5-7):</label>
                <input type="text" id="pagesTarget" placeholder="Enter page numbers...">
            </div>
        </div>

        <button class="action-btn" id="actionBtn">Remove Pages & Download</button>
    </div>

    <script>
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const deleteOptions = document.getElementById('deleteOptions');
        const actionBtn = document.getElementById('actionBtn');
        let srcFile = null;

        uploadBox.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if(e.target.files[0]) {
                srcFile = e.target.files[0];
                uploadBox.querySelector('.upload-text').textContent = srcFile.name;
                deleteOptions.style.display = 'block';
                actionBtn.style.display = 'block';
            }
        });

        actionBtn.addEventListener('click', async () => {
            if(!srcFile) return;
            actionBtn.disabled = true; actionBtn.textContent = 'Filtering Structure...';
            try {
                const bytes = await srcFile.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(bytes);
                const totalPages = pdfDoc.getPageCount();
                
                const targets = document.getElementById('pagesTarget').value.split(',').map(num => parseInt(num.trim()) - 1);
                const cleanPdf = await PDFLib.PDFDocument.create();
                
                const indices = [];
                for(let i=0; i<totalPages; i++) {
                    if(!targets.includes(i)) indices.push(i);
                }
                
                if(indices.length > 0) {
                    const pages = await cleanPdf.copyPages(pdfDoc, indices);
                    pages.forEach(p => cleanPdf.addPage(p));
                }

                const outBytes = await cleanPdf.save();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([outBytes], { type: 'application/pdf' }));
                link.download = 'DailyKitBox-Cleaned.pdf';
                link.click();
            } catch(e) { alert('Processing breakdown errored.'); }
            actionBtn.disabled = false; actionBtn.textContent = 'Remove Pages & Download';
        });
    </script>
</body>
</html>
