<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF - DailyKitBox</title>
    <!-- Sydney Theme CSS Link -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Tool specific styling */
        .upload-box { border: 2px dashed #0a192f; padding: 40px; border-radius: 10px; margin-bottom: 20px; }
        #downloadArea { margin-top: 20px; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Merge PDF</h1>
        <a href="../index.html">← Back to DailyKitBox</a>
    </div>

    <!-- Main Content -->
    <div class="tool-container">
        <div class="tool-card">
            <div class="upload-box">
                <p>Upload your PDF files to merge them into one document.</p>
                <!-- Hidden Input -->
                <input type="file" id="fileInput" multiple style="display:none;" onchange="handleFiles()">
                
                <!-- Main Button -->
                <button class="premium-btn" onclick="document.getElementById('fileInput').click()">
                    Select PDF Files
                </button>
            </div>

            <!-- Spacer -->
            <div class="spacer"></div>

            <!-- Download Button (Initially Hidden) -->
            <div id="downloadArea" style="display: none;">
                <button class="premium-btn" style="background-color: #28a745;" onclick="downloadPDF()">
                    Download Merged PDF
                </button>
            </div>
        </div>

        <!-- Instructions -->
        <section class="how-to-section">
            <h2>How to use Merge PDF?</h2>
            <ol>
                <li><strong>Step 1:</strong> Select your PDF files using the button.</li>
                <li><strong>Step 2:</strong> Wait for the files to process.</li>
                <li><strong>Step 3:</strong> Click the "Download" button to get your merged file.</li>
            </ol>
        </section>
    </div>

    <script>
        function handleFiles() {
            // Yahan apki file processing ki logic aayegi
            alert("Files selected! Processing...");
            
            // Simulation: 2 second baad download button dikha do
            setTimeout(() => {
                document.getElementById('downloadArea').style.display = 'block';
            }, 2000);
        }

        function downloadPDF() {
            alert("Downloading your merged PDF...");
        }
    </script>
</body>
</html>
