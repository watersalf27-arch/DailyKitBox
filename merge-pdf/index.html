<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF - DailyKitBox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --radius-lg: 12px;
            --radius-md: 8px;
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .converter-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-md);
        }
        .title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .title-container .icon { font-size: 32px; }
        .title-container h1 {
            font-size: 28px;
            font-weight: 700;
        }
        .description {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .upload-box {
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-lg);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background-color: #f8fafc;
            transition: border-color 0.2s, background-color 0.2s;
            margin-bottom: 24px;
        }
        .upload-box:hover {
            border-color: var(--primary);
            background-color: rgba(37, 99, 235, 0.02);
        }
        .upload-icon {
            font-size: 40px;
            margin-bottom: 12px;
            color: var(--text-muted);
        }
        .upload-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .upload-hint {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .hidden-input-wrapper {
            opacity: 0;
            position: absolute;
            z-index: -1;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
        .file-list {
            margin-bottom: 24px;
            max-height: 200px;
            overflow-y: auto;
            border-radius: var(--radius-md);
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .file-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80%;
        }
        .merge-btn {
            display: none;
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .merge-btn:hover { background-color: var(--primary-hover); }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="converter-card">
        <a href="../index.html" class="back-btn">&larr; Back to Home</a>
        <div class="title-container">
            <span class="icon">🗂️</span>
            <h1>Merge PDF</h1>
        </div>
        <p class="description">Combine multiple PDF files into one single document instantly in your browser without losing quality.</p>
        <div class="upload-box" id="uploadBox">
            <div class="upload-icon">📂</div>
            <div class="upload-text">Tap to Upload PDF Files</div>
            <div class="upload-hint">Select 2 or more PDF files</div>
        </div>
        <div class="hidden-input-wrapper">
            <input type="file" id="fileInput" accept="application/pdf" multiple>
        </div>
        <div class="file-list" id="fileList"></div>
        <button class="merge-btn" id="mergeBtn">Merge PDF Files</button>
    </div>
    <script>
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const mergeBtn = document.getElementById('mergeBtn');
        let selectedFiles = [];

        uploadBox.addEventListener('click', (e) => {
            e.preventDefault();
            fileInput.click();
        });
        uploadBox.addEventListener('touchstart', (e) => {
            fileInput.click();
        });
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            if (!files || files.length === 0) return;
            for (let file of files) {
                if (file.type === "application/pdf") {
                    selectedFiles.push(file);
                    const item = document.createElement('div');
                    item.classList.add('file-item');
                    item.innerHTML = `<span class="file-name">📄 ${file.name}</span><span style="color:var(--text-muted); font-size:12px;">${(file.size/(1024*1024)).toFixed(2)} MB</span>`;
                    fileList.appendChild(item);
                }
            }
            if (selectedFiles.length >= 2) {
                mergeBtn.style.display = 'block';
            }
        }

        mergeBtn.addEventListener('click', async () => {
            if (selectedFiles.length < 2) return;
            mergeBtn.disabled = true;
            mergeBtn.textContent = 'Merging Files...';
            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                for (let file of selectedFiles) {
                    const fileBytes = await file.arrayBuffer();
                    const pdfDoc = await PDFLib.PDFDocument.load(fileBytes);
                    const copiedPages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }
                const mergedPdfBytes = await mergedPdf.save();
                const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'DailyKitBox-Merged.pdf';
                link.click();
            } catch (err) {
                console.error(err);
                alert('Error merging files. Please check if files are corrupted.');
            }
            mergeBtn.disabled = false;
            mergeBtn.textContent = 'Merge PDF Files';
        });
    </script>
</body>
</html>
